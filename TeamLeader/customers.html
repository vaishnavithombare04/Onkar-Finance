<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="color-scheme" content="light dark">
  <script>
    (function () {
      const saved = localStorage.getItem('onkar-theme');
      const theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
      document.documentElement.style.colorScheme = theme;
    })();
  </script>
  <meta name="view-transition" content="same-origin">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onkar Finance — Team Customers</title>
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    .drawer-overlay {
      position: fixed;
      top: 0;
      right: -450px;
      width: 420px;
      height: 100%;
      background-color: var(--color-surface);
      box-shadow: -4px 0 20px rgba(0,0,0,0.1);
      z-index: 1050;
      transition: right 0.3s ease;
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--color-border);
    }
    .drawer-overlay.open {
      right: 0;
    }
    .drawer-header {
      padding: 24px;
      border-bottom: 1px solid var(--color-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .drawer-body {
      padding: 24px;
      overflow-y: auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .timeline-item {
      position: relative;
      padding-left: 24px;
      padding-bottom: 16px;
    }
    .timeline-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 6px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: var(--color-primary);
    }
    .timeline-item::after {
      content: '';
      position: absolute;
      left: 4px;
      top: 16px;
      width: 2px;
      height: calc(100% - 10px);
      background-color: var(--color-border);
    }
    .timeline-item:last-child::after {
      display: none;
    }
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--color-text-secondary);
    }
    .empty-state i { width: 48px; height: 48px; opacity: 0.3; margin-bottom: 12px; }
  </style>
</head>

<body>
  <div class="admin-layout">

    <!-- Sidebar -->
    <div data-component="sidebar"></div>

    <!-- Main Content Area -->
    <div class="main-content">
      <!-- Topbar -->
      <div data-component="topbar"></div>

      <!-- ══ PAGE CONTENT ══ -->
      <div id="page-content" class="w-full flex flex-column gap-lg">

        <!-- ── Page Header ── -->
        <div class="flex justify-between align-center">
          <div>
            <h1 style="font-size: var(--fs-h1); font-weight: 700; letter-spacing: -0.5px;">Customer Management (<span id="custCount">0</span>)</h1>
            <p class="text-secondary" style="font-size: 13px;">View borrower history, check KYC validations, and track active loan portfolios.</p>
          </div>
        </div>

        <!-- Search bar -->
        <div class="card flex align-center justify-between" style="padding: 16px;">
          <div class="search-bar" style="width: 320px; background-color: var(--color-bg);">
            <i class="lucide-search"></i>
            <input type="text" placeholder="Search customers..." id="customerSearch">
          </div>
          <div class="flex gap-sm">
            <select class="form-control" style="width: 200px; padding: 8px 12px;" id="kycFilter">
              <option value="">All KYC Statuses</option>
              <option value="Completed">Completed</option>
              <option value="Pending">Pending</option>
            </select>
            <select class="form-control" style="width: 200px; padding: 8px 12px;" id="loanFilter">
              <option value="">All Loan Statuses</option>
              <option value="active">Active Loan</option>
              <option value="closed">No Active Loan</option>
            </select>
          </div>
        </div>

        <!-- Table list -->
        <div class="card" style="padding: 0;">
          <div class="table-responsive">
            <table class="data-table" id="customerTable">
              <thead>
                <tr>
                  <th>Customer ID</th>
                  <th>Name</th>
                  <th>Email Address</th>
                  <th>Contact</th>
                  <th>Active Loans</th>
                  <th>Branch</th>
                  <th>KYC Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="customerTableBody">
                <!-- Rendered dynamically -->
              </tbody>
            </table>
          </div>

          <!-- empty state placeholder -->
          <div id="emptyState" class="empty-state" style="display:none;">
            <i class="lucide-search-x"></i>
            <p class="bold" style="font-size:15px; margin-bottom:4px;">No customers found</p>
            <p style="font-size:13px;">Try adjusting your search or filters.</p>
          </div>
        </div>

      </div><!-- end #page-content -->

      <!-- Footer -->
      <div data-component="footer"></div>

    </div><!-- end .main-content -->
  </div><!-- end .admin-layout -->

  <!-- Drawer backdrop -->
  <div id="drawerBackdrop" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:1049; backdrop-filter: blur(2px);" onclick="closeDrawer()"></div>

  <!-- Sliding Details Drawer -->
  <div id="customerDrawer" class="drawer-overlay">
    <div class="drawer-header">
      <h3 class="bold">Customer Profile Details</h3>
      <i class="lucide-x pointer" onclick="closeDrawer()" style="font-size: 20px;"></i>
    </div>
    
    <div class="drawer-body" id="drawerBody">
      <!-- injected details -->
    </div>
  </div>

    let activeTimelineCust = null;

    /* ─────────────── Render Table ─────────────── */
    function renderCustomerTable() {
      const searchVal = document.getElementById('customerSearch').value.toLowerCase().trim();
      const kycVal    = document.getElementById('kycFilter').value;
      const loanVal   = document.getElementById('loanFilter').value;

      // Filter by team
      const teamMembers = ["Rahul Verma", "Kiran Das", "Sunil Mehta", "Priya N."];
      const filtered = CUSTOMERS.filter(c => {
        const matchTeam = teamMembers.includes(c.assignedTo);
        const matchSearch =
          c.name.toLowerCase().includes(searchVal) ||
          c.id.toLowerCase().includes(searchVal) ||
          c.contact.toLowerCase().includes(searchVal) ||
          c.email.toLowerCase().includes(searchVal);

        const matchKyc = kycVal === '' || c.kycStatus === kycVal;

        const matchLoan =
          loanVal === '' ||
          (loanVal === 'active'  && c.activeLoans > 0) ||
          (loanVal === 'closed'  && c.activeLoans === 0);

        return matchTeam && matchSearch && matchKyc && matchLoan;
      });

      const tbody = document.getElementById('customerTableBody');
      const empty = document.getElementById('emptyState');
      const countEl = document.getElementById('custCount');
      if (countEl) countEl.textContent = filtered.length;

      if (filtered.length === 0) {
        tbody.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      tbody.innerHTML = filtered.map(c => {
        const badgeClass = c.kycStatus === 'Completed' ? 'badge-success' : 'badge-warning';
        const initials = c.name.split(' ').map(n => n[0]).join('');

        return `
          <tr>
            <td class="bold">${c.id}</td>
            <td>
              <div class="flex align-center gap-sm">
                <div class="avatar" style="width: 32px; height: 32px;">${initials}</div>
                <span class="bold">${c.name}</span>
              </div>
            </td>
            <td>${c.email}</td>
            <td>${c.contact}</td>
            <td><span class="badge badge-info">${c.activeLoans} Active</span></td>
            <td>Mumbai Main</td>
            <td><span class="badge ${badgeClass}">${c.kycStatus}</span></td>
      <td>
              <button class="btn btn-outline" style="padding: 6px 12px; font-size: 12px;" data-customer-id="${c.id}">
                View Profile
              </button>
            </td>
          </tr>
        `;
      }).join('');
 
      const pills = document.querySelectorAll('.topbar .tab-pill');
      if (pills.length > 0) {
        pills.forEach((p, idx) => {
          if (kycVal === 'Pending' && idx === 1) {
            p.classList.add('active');
          } else if (kycVal !== 'Pending' && idx === 0) {
            p.classList.add('active');
          } else {
            p.classList.remove('active');
          }
        });
      }
 
      if (window.lucide) lucide.createIcons();
    }

    /* ─────────────── Details Drawer ─────────────── */
    window.openDrawer = function(id) {
      const cust = CUSTOMERS.find(c => c.id === id);
      if (!cust) return;
      
      const drawer = document.getElementById('customerDrawer');
      const body = document.getElementById('drawerBody');
      
      const scoreColor = cust.creditScore
        ? (cust.creditScore >= 750 ? '#22c55e' : '#f59e0b')
        : 'var(--color-text-secondary)';

      const initials = cust.name.split(' ').map(n => n[0]).join('');

      body.innerHTML = `
        <div class="flex align-center gap-md">
          <div class="avatar" style="width: 56px; height: 56px; font-size: 20px;">${initials}</div>
          <div>
            <h4 class="bold" style="font-size: 16px;">${cust.name}</h4>
            <span class="text-muted" style="font-size: 12px;">ID: ${cust.id}</span>
          </div>
        </div>
        
        <hr style="border: none; border-top: 1px solid var(--color-border);">
        
        <div>
          <h5 class="bold" style="margin-bottom: 8px;">Contact Information</h5>
          <div class="flex flex-column gap-sm" style="font-size: 13px;">
            <div class="flex justify-between"><span class="text-secondary">Email</span><span>${cust.email}</span></div>
            <div class="flex justify-between"><span class="text-secondary">Phone</span><span>${cust.contact}</span></div>
            <div class="flex justify-between"><span class="text-secondary">Assigned To</span><span>${cust.assignedTo}</span></div>
          </div>
        </div>

        <div>
          <h5 class="bold" style="margin-bottom: 8px;">Documents Verified (KYC)</h5>
          <div class="flex gap-sm" style="flex-wrap: wrap;">
            ${(cust.kycDocs || []).map(d => `<span class="badge badge-success"><i class="lucide-check-check"></i> ${d}</span>`).join(' ')}
            ${(cust.kycPending || []).map(d => `<span class="badge badge-warning"><i class="lucide-clock"></i> ${d}</span>`).join(' ')}
          </div>
        </div>

        <div>
          <h5 class="bold" style="margin-bottom: 12px;">Timeline Activity</h5>
          <div>
            ${(cust.timeline || []).map(ev => `
              <div class="timeline-item">
                <span class="bold" style="font-size: 13px; display: block;">${ev.text}</span>
                <span class="text-muted" style="font-size: 11px;">${ev.date}</span>
              </div>
            `).join('')}
          </div>
        </div>
      `;
      
      drawer.classList.add('open');
      document.getElementById('drawerBackdrop').style.display = 'block';
      if (window.lucide) lucide.createIcons();
    };

    window.closeDrawer = function() {
      document.getElementById('customerDrawer').classList.remove('open');
      document.getElementById('drawerBackdrop').style.display = 'none';
    };

    /* ─────────────── Listeners ─────────────── */
    document.getElementById('customerSearch').addEventListener('input', renderCustomerTable);
    document.getElementById('kycFilter').addEventListener('change', renderCustomerTable);
    document.getElementById('loanFilter').addEventListener('change', renderCustomerTable);

    // Delegated click for View Profile buttons (works even after table re-render)
    document.getElementById('customerTableBody').addEventListener('click', function(e) {
      const btn = e.target.closest('[data-customer-id]');
      if (btn) openDrawer(btn.getAttribute('data-customer-id'));
    });
 
    /* ─────────────── Global Search Sync ─────────────── */
    document.body.addEventListener('input', function (e) {
      if (e.target && e.target.id === 'globalSearch') {
        const custSearch = document.getElementById('customerSearch');
        if (custSearch) {
          custSearch.value = e.target.value;
          renderCustomerTable();
        }
      }
    });
 
    /* ─────────────── Topbar Tab Interceptor ─────────────── */
    function setupTopbarTabs() {
      const pills = document.querySelectorAll('.topbar .tab-pill');
      if (pills.length === 0) {
        setTimeout(setupTopbarTabs, 50);
        return;
      }
 
      pills.forEach((pill, idx) => {
        pill.removeAttribute('onclick');
        
        if (idx === 0) {
          pill.classList.add('active');
        } else {
          pill.classList.remove('active');
        }
 
        pill.addEventListener('click', function(e) {
          pills.forEach(p => p.classList.remove('active'));
          this.classList.add('active');
 
          const kycFilter = document.getElementById('kycFilter');
          if (idx === 0) {
            if (kycFilter) kycFilter.value = '';
          } else {
            if (kycFilter) kycFilter.value = 'Pending';
          }
          renderCustomerTable();
        });
      });
    }
 
    setupTopbarTabs();
 
    /* ─────────────── Initial render ─────────────── */
    renderCustomerTable();
  }
  </script>
