<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="color-scheme" content="light dark">
  <script>
    (function() {
      const saved = localStorage.getItem('onkar-theme');
      const theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
      document.documentElement.style.colorScheme = theme;
    })();
  </script>
  <meta name="view-transition" content="same-origin">
  <title>Onkar Finance — User Profile</title>
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <div class="admin-layout">
    <div data-component="sidebar"></div>
    
    <div class="main-content">
      <div data-component="topbar"></div>
      
      <div id="page-content" class="w-full flex flex-column gap-lg">
      <div class="flex justify-between align-center">
        <div>
          <h1 style="font-size: var(--fs-h1); font-weight: 700; letter-spacing: -0.5px;">My Profile Settings</h1>
          <p class="text-secondary" style="font-size: 13px;">Manage your personal login credentials, contact info, and view account logs.</p>
        </div>
      </div>

      <div class="grid grid-3" style="align-items: start;">
        <!-- Left: Avatar uploader -->
        <div class="card flex flex-column align-center gap-md text-center">
          <div class="avatar" style="width: 100px; height: 100px; font-size: 36px; border: 4px solid var(--color-primary-light);">
            AD
          </div>
          <div>
            <h3 class="bold">Aditya S.</h3>
            <span class="text-muted" style="font-size: 12px;">Super Administrator</span>
          </div>
          <button class="btn btn-outline" onclick="showToast('Uploading avatar...', 'info')"><i class="lucide-camera"></i> Change Photo</button>
        </div>

        <!-- Right: Profile Info Form & Password Form -->
        <div style="grid-column: span 2; display: flex; flex-direction: column; gap: 24px;">
          <div class="card">
            <h3 class="card-title m-b-md">Personal Information</h3>
            <form id="profileForm">
              <div class="grid-2">
                <div class="form-group">
                  <label class="form-label">First Name</label>
                  <input type="text" class="form-control" value="Aditya">
                </div>
                <div class="form-group">
                  <label class="form-label">Last Name</label>
                  <input type="text" class="form-control" value="Sen">
                </div>
              </div>
              <div class="grid-2">
                <div class="form-group">
                  <label class="form-label">Email Address</label>
                  <input type="email" class="form-control" value="aditya.sen@onkarfinance.com">
                </div>
                <div class="form-group">
                  <label class="form-label">Mobile Number</label>
                  <input type="text" class="form-control" value="+91 98888 77777">
                </div>
              </div>
              <div class="flex justify-end m-t-md">
                <button type="submit" class="btn btn-primary"><i class="lucide-check"></i> Save Changes</button>
              </div>
            </form>
          </div>

          <div class="card">
            <h3 class="card-title m-b-md">Change Password</h3>
            <form id="passwordForm">
              <div class="form-group">
                <label class="form-label">Current Password</label>
                <input type="password" class="form-control" placeholder="••••••••">
              </div>
              <div class="grid-2">
                <div class="form-group">
                  <label class="form-label">New Password</label>
                  <input type="password" class="form-control" placeholder="••••••••">
                </div>
                <div class="form-group">
                  <label class="form-label">Confirm New Password</label>
                  <input type="password" class="form-control" placeholder="••••••••">
                </div>
              </div>
              <div class="flex justify-end m-t-md">
                <button type="submit" class="btn btn-primary"><i class="lucide-key"></i> Update Password</button>
              </div>
            </form>
          </div>
        </div>
      </div>
      </div> <!-- End page-content -->
      <div data-component="footer"></div>
    </div>
  </div>

  <script src="../assets/js/global.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/components.js"></script>
  <script src="../assets/js/nav.js"></script>
  <script data-page-init>
  {
    document.getElementById('profileForm').addEventListener('submit', (e) => {
      e.preventDefault();
      showToast('Profile information updated successfully!', 'success');
    });

    document.getElementById('passwordForm').addEventListener('submit', (e) => {
      e.preventDefault();
      showToast('Account credentials modified successfully', 'success');
      document.getElementById('passwordForm').reset();
    });
  }
  </script>
</body>
</html>
