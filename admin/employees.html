<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <script>
    (function() {
      const saved = localStorage.getItem('onkar-theme');
      const theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
      document.documentElement.style.colorScheme = theme;
    })();
  </script>
  <meta name="view-transition" content="same-origin">
  <title>Onkar Finance — Employees Setup</title>
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <div class="admin-layout">
    <div data-component="sidebar"></div>
    
    <div class="main-content">
      <div data-component="topbar"></div>
      
      <div id="page-content" class="w-full flex flex-column gap-lg">
      <div class="flex justify-between align-center">
        <div>
          <h1 style="font-size: var(--fs-h1); font-weight: 700; letter-spacing: -0.5px;">Employee Directories</h1>
          <p class="text-secondary" style="font-size: 13px;">Manage staff details, track attendance quotas, and configure role associations.</p>
        </div>
        <button class="btn btn-primary" onclick="openModal('addEmployeeModal')">
          <i class="lucide-user-plus"></i> Add New Employee
        </button>
      </div>

      <!-- Overview Cards -->
      <div class="grid grid-3">
        <div class="card stat-card">
          <div class="flex justify-between align-center">
            <span class="stat-label">Active Staff</span>
            <div class="stat-icon"><i class="lucide-users"></i></div>
          </div>
          <div class="stat-value">24</div>
        </div>
        <div class="card stat-card">
          <div class="flex justify-between align-center">
            <span class="stat-label">Avg Attendance</span>
            <div class="stat-icon"><i class="lucide-calendar-check"></i></div>
          </div>
          <div class="stat-value">94.8%</div>
        </div>
        <div class="card stat-card">
          <div class="flex justify-between align-center">
            <span class="stat-label">Target Completion Ratio</span>
            <div class="stat-icon"><i class="lucide-bullseye"></i></div>
          </div>
          <div class="stat-value">84.2%</div>
        </div>
      </div>

      <!-- Employee List Table -->
      <div class="card" style="padding: 0;">
        <div class="table-responsive">
          <table class="data-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Role</th>
                <th>Branch</th>
                <th>Team Segment</th>
                <th>Attendance %</th>
                <th>Target vs Achieved</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="employeeTableBody">
              <!-- Rendered dynamically -->
            </tbody>
          </table>
        </div>
      </div>

      </div> <!-- End page-content -->
      
      <div data-component="footer"></div>
    </div>
  </div>

  <!-- Add Employee Modal -->
  <div id="addEmployeeModal" class="modal-overlay">
    <div class="modal-container">
      <i class="lucide-x modal-close" onclick="closeModal('addEmployeeModal')"></i>
      <h3 class="m-b-md">Add New Staff Member</h3>
      
      <form id="addEmployeeForm">
        <div class="grid-2">
          <div class="form-group">
            <label class="form-label" for="empName">Full Name</label>
            <input type="text" id="empName" class="form-control" placeholder="Ramesh Patil" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="empRole">Designation / Role</label>
            <select id="empRole" class="form-control">
              <option value="Relationship Manager">Relationship Manager</option>
              <option value="Branch Manager">Branch Manager</option>
              <option value="Credit Analyst">Credit Analyst</option>
              <option value="Verification Officer">Verification Officer</option>
            </select>
          </div>
        </div>
        
        <div class="grid-2">
          <div class="form-group">
            <label class="form-label" for="empBranch">Assigned Branch</label>
            <select id="empBranch" class="form-control">
              <option value="Mumbai Main">Mumbai Main</option>
              <option value="Delhi Connaught">Delhi Connaught</option>
              <option value="Pune Deccan">Pune Deccan</option>
              <option value="Mumbai Andheri">Mumbai Andheri</option>
              <option value="Bengaluru Indiranagar">Bengaluru Indiranagar</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="empTeam">Team / Segment</label>
            <select id="empTeam" class="form-control">
              <option value="Sales Team A">Sales Team A</option>
              <option value="Sales Team B">Sales Team B</option>
              <option value="Risk &amp; Credit">Risk &amp; Credit</option>
              <option value="Retail Loans">Retail Loans</option>
              <option value="SME Lending">SME Lending</option>
              <option value="Gold &amp; Agri">Gold &amp; Agri</option>
            </select>
          </div>
        </div>

        <div class="grid-2">
          <div class="form-group">
            <label class="form-label" for="empTarget">Monthly Payout Quota Target (INR)</label>
            <input type="number" id="empTarget" class="form-control" placeholder="3000000" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="empStatus">Initial Status</label>
            <select id="empStatus" class="form-control">
              <option value="Active">Active</option>
              <option value="Suspended">Suspended</option>
            </select>
          </div>
        </div>

        <div class="flex justify-end gap-sm m-t-md">
          <button type="button" class="btn btn-outline" onclick="closeModal('addEmployeeModal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Employee</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Edit Employee Modal -->
  <div id="editEmployeeModal" class="modal-overlay">
    <div class="modal-container">
      <i class="lucide-x modal-close" onclick="closeModal('editEmployeeModal')"></i>
      <h3 class="m-b-md">Edit Staff Member</h3>
      
      <form id="editEmployeeForm">
        <input type="hidden" id="editEmpIndex" />
        <div class="grid-2">
          <div class="form-group">
            <label class="form-label" for="editEmpName">Full Name</label>
            <input type="text" id="editEmpName" class="form-control" placeholder="Ramesh Patil" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="editEmpRole">Designation / Role</label>
            <select id="editEmpRole" class="form-control">
              <option value="Relationship Manager">Relationship Manager</option>
              <option value="Branch Manager">Branch Manager</option>
              <option value="Credit Analyst">Credit Analyst</option>
              <option value="Verification Officer">Verification Officer</option>
            </select>
          </div>
        </div>
        
        <div class="grid-2">
          <div class="form-group">
            <label class="form-label" for="editEmpBranch">Assigned Branch</label>
            <select id="editEmpBranch" class="form-control">
              <option value="Mumbai Main">Mumbai Main</option>
              <option value="Delhi Connaught">Delhi Connaught</option>
              <option value="Pune Deccan">Pune Deccan</option>
              <option value="Mumbai Andheri">Mumbai Andheri</option>
              <option value="Bengaluru Indiranagar">Bengaluru Indiranagar</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="editEmpTeam">Team / Segment</label>
            <select id="editEmpTeam" class="form-control">
              <option value="Sales Team A">Sales Team A</option>
              <option value="Sales Team B">Sales Team B</option>
              <option value="Risk &amp; Credit">Risk &amp; Credit</option>
              <option value="Retail Loans">Retail Loans</option>
              <option value="SME Lending">SME Lending</option>
              <option value="Gold &amp; Agri">Gold &amp; Agri</option>
            </select>
          </div>
        </div>

        <div class="grid-2">
          <div class="form-group">
            <label class="form-label" for="editEmpTarget">Monthly Payout Quota Target (INR)</label>
            <input type="number" id="editEmpTarget" class="form-control" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="editEmpAchieved">Achieved Amount (INR)</label>
            <input type="number" id="editEmpAchieved" class="form-control" required>
          </div>
        </div>

        <div class="grid-2">
          <div class="form-group">
            <label class="form-label" for="editEmpAttendance">Attendance %</label>
            <input type="number" id="editEmpAttendance" class="form-control" min="0" max="100" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="editEmpStatus">Status</label>
            <select id="editEmpStatus" class="form-control">
              <option value="Active">Active</option>
              <option value="Suspended">Suspended</option>
            </select>
          </div>
        </div>

        <div class="flex justify-end gap-sm m-t-md">
          <button type="button" class="btn btn-outline" onclick="closeModal('editEmployeeModal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../assets/js/global.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/components.js"></script>
  <script src="../assets/js/nav.js"></script>
  <script data-page-init>
  {
    function renderEmployees() {
      const emps = api.getDb().employees;
      const tbody = document.getElementById('employeeTableBody');
      tbody.innerHTML = '';
      
      emps.forEach((emp, index) => {
        const badge = emp.status === 'Active' ? 'badge-success' : 'badge-danger';
        
        tbody.innerHTML += `
          <tr>
            <td class="bold">
              <div class="flex align-center gap-sm">
                <div class="avatar" style="width:32px; height:32px;">${emp.name.split(' ').map(n => n[0]).join('')}</div>
                <span>${emp.name}</span>
              </div>
            </td>
            <td>${emp.role}</td>
            <td>${emp.branch}</td>
            <td>${emp.team}</td>
            <td class="bold">${emp.attendance}%</td>
            <td>
              <span class="bold">${formatCurrency(emp.achieved)}</span>
              <span class="text-muted" style="font-size: 11px; display: block;">Target: ${formatCurrency(emp.target)}</span>
            </td>
            <td><span class="badge ${badge}">${emp.status}</span></td>
            <td>
              <button class="btn btn-outline" style="padding: 6px 12px; font-size: 12px;" onclick="openEditEmployeeModal(${index})">
                Edit Staff
              </button>
            </td>
          </tr>
        `;
      });
      if (window.lucide) lucide.createIcons();
    }
 
    document.getElementById('addEmployeeForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const name = document.getElementById('empName').value;
      const role = document.getElementById('empRole').value;
      const branch = document.getElementById('empBranch').value;
      const team = document.getElementById('empTeam').value;
      const target = parseFloat(document.getElementById('empTarget').value);
      const status = document.getElementById('empStatus').value;
      
      const db = api.getDb();
      db.employees.push({ name, role, branch, team, attendance: 100, target, achieved: 0, status });
      api.saveDb(db);
      
      showToast('Staff member added successfully!', 'success');
      closeModal('addEmployeeModal');
      document.getElementById('addEmployeeForm').reset();
      renderEmployees();
    });
 
    window.openEditEmployeeModal = function(index) {
      const db = api.getDb();
      const emp = db.employees[index];
      if (!emp) return;
 
      document.getElementById('editEmpIndex').value = index;
      document.getElementById('editEmpName').value = emp.name;
      document.getElementById('editEmpRole').value = emp.role;
      document.getElementById('editEmpBranch').value = emp.branch;
      document.getElementById('editEmpTeam').value = emp.team;
      document.getElementById('editEmpTarget').value = emp.target;
      document.getElementById('editEmpAchieved').value = emp.achieved || 0;
      document.getElementById('editEmpAttendance').value = emp.attendance || 100;
      document.getElementById('editEmpStatus').value = emp.status;
 
      openModal('editEmployeeModal');
    };
 
    document.getElementById('editEmployeeForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const index = parseInt(document.getElementById('editEmpIndex').value, 10);
      
      const db = api.getDb();
      if (db.employees[index]) {
        db.employees[index].name = document.getElementById('editEmpName').value;
        db.employees[index].role = document.getElementById('editEmpRole').value;
        db.employees[index].branch = document.getElementById('editEmpBranch').value;
        db.employees[index].team = document.getElementById('editEmpTeam').value;
        db.employees[index].target = parseFloat(document.getElementById('editEmpTarget').value);
        db.employees[index].achieved = parseFloat(document.getElementById('editEmpAchieved').value);
        db.employees[index].attendance = parseInt(document.getElementById('editEmpAttendance').value, 10);
        db.employees[index].status = document.getElementById('editEmpStatus').value;
        
        api.saveDb(db);
        showToast('Employee details updated successfully!', 'success');
        closeModal('editEmployeeModal');
        renderEmployees();
      }
    });
    
    renderEmployees();
  }
  </script>
</body>
</html>
