<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="color-scheme" content="light dark">
  <script>
    (function() {
      const saved = localStorage.getItem('onkar-theme');
      const theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
      document.documentElement.style.colorScheme = theme;
    })();
  </script>
  <meta name="view-transition" content="same-origin">
  <title>Onkar Finance — Branches Setup</title>
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <div class="admin-layout">
    <div data-component="sidebar"></div>
    
    <div class="main-content">
      <div data-component="topbar"></div>
      
      <div id="page-content" class="w-full flex flex-column gap-lg">
      <div class="flex justify-between align-center">
        <div>
          <h1 style="font-size: var(--fs-h1); font-weight: 700; letter-spacing: -0.5px;">Branches &amp; Regions</h1>
          <p class="text-secondary" style="font-size: 13px;">Monitor localized performance metrics, branch managers, and regional disbursal goals.</p>
        </div>
        <button class="btn btn-primary" onclick="openModal('registerBranchModal')">
          <i class="lucide-plus"></i> Register Branch
        </button>
      </div>

      <!-- Branch Grid — rendered dynamically -->
      <div class="grid grid-3" id="branchGrid">
        <!-- cards injected by renderBranches() -->
      </div>

      <!-- ── Register Branch Modal ──────────────────────────────── -->
      <div id="registerBranchModal" class="modal-overlay">
        <div class="modal-container">
          <i class="lucide-x modal-close" onclick="closeModal('registerBranchModal')"></i>
          <h3>Register New Branch</h3>
          <form id="registerBranchForm">

            <div class="grid-2">
              <div class="form-group">
                <label class="form-label" for="branchName">Branch Name</label>
                <input type="text" id="branchName" class="form-control" placeholder="e.g. Bengaluru Indiranagar" required>
              </div>
              <div class="form-group">
                <label class="form-label" for="branchRegion">Region / State</label>
                <input type="text" id="branchRegion" class="form-control" placeholder="e.g. Karnataka" required>
              </div>
            </div>

            <div class="grid-2">
              <div class="form-group">
                <label class="form-label" for="branchManager">Branch Manager</label>
                <input type="text" id="branchManager" class="form-control" placeholder="e.g. Vikram Nair" required>
              </div>
              <div class="form-group">
                <label class="form-label" for="branchAddress">Address</label>
                <input type="text" id="branchAddress" class="form-control" placeholder="e.g. 12 MG Road, Bengaluru">
              </div>
            </div>

            <div class="grid-2">
              <div class="form-group">
                <label class="form-label" for="branchTargetCr">Monthly Disbursal Target (₹ Cr)</label>
                <input type="number" id="branchTargetCr" class="form-control" placeholder="e.g. 2.0" step="0.1" min="0" required>
              </div>
              <div class="form-group">
                <label class="form-label" for="branchStatus">Status</label>
                <select id="branchStatus" class="form-control">
                  <option value="On Track">On Track</option>
                  <option value="Action Needed">Action Needed</option>
                  <option value="Lagging">Lagging</option>
                  <option value="New">New Branch</option>
                </select>
              </div>
            </div>

            <div class="flex justify-end gap-sm m-t-md">
              <button type="button" class="btn btn-outline" onclick="closeModal('registerBranchModal')">Cancel</button>
              <button type="submit" class="btn btn-primary"><i class="lucide-building-2"></i> Register Branch</button>
            </div>
          </form>
        </div>
      </div>

      </div> <!-- End page-content -->
      <div data-component="footer"></div>
    </div>
  </div>

  <script src="../assets/js/global.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/components.js"></script>
  <script src="../assets/js/nav.js"></script>
  <script data-page-init>
  {
    // ── Seed migration for existing localStorage saves ──────────
    (function seedBranches() {
      const db = api.getDb();
      if (!db.branches) {
        db.branches = [
          { id: "BR-001", name: "Mumbai Main",    manager: "Rahul Verma", region: "Maharashtra", staff: 12, disbursedCr: 2.4,  targetCr: 2.6, status: "On Track"      },
          { id: "BR-002", name: "Delhi Connaught", manager: "Siddhi Sen",  region: "Delhi NCR",   staff: 8,  disbursedCr: 1.8,  targetCr: 2.4, status: "Action Needed" },
          { id: "BR-003", name: "Pune Deccan",     manager: "Anjali Rao",  region: "Maharashtra", staff: 4,  disbursedCr: 0.62, targetCr: 1.2, status: "Lagging"       }
        ];
        api.saveDb(db);
      }
    })();

    // ── Render branch cards ─────────────────────────────────────
    function renderBranches() {
      const db       = api.getDb();
      const branches = db.branches || [];
      const grid     = document.getElementById('branchGrid');
      grid.innerHTML = '';

      if (branches.length === 0) {
        grid.innerHTML = `
          <div style="grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--color-text-muted);">
            <i class="lucide-building-2" style="font-size:40px; display:block; margin-bottom:12px;"></i>
            No branches registered yet. Click <strong>Register Branch</strong> to add one.
          </div>`;
        if (window.lucide) lucide.createIcons();
        return;
      }

      branches.forEach(b => {
        const target = parseFloat(b.targetCr) || 0;
        const disbursed = parseFloat(b.disbursedCr) || 0;
        const pct = target > 0 ? Math.min(100, Math.round((disbursed / target) * 100)) : 0;

        const barColor  = pct >= 85 ? 'var(--color-success)' : pct >= 60 ? 'var(--color-primary)' : pct >= 40 ? 'var(--color-warning)' : 'var(--color-danger)';
        const badgeClass = b.status === 'On Track'      ? 'badge-success'
                         : b.status === 'Action Needed' ? 'badge-warning'
                         : b.status === 'Lagging'       ? 'badge-danger'
                         : 'badge-info';

        grid.innerHTML += `
          <div class="card flex flex-column gap-md">
            <div class="flex justify-between align-center">
              <div>
                <h3 class="bold" style="font-size:16px;">${b.name}</h3>
                <span class="text-muted" style="font-size:12px;">
                  <i class="lucide-user" style="font-size:11px;"></i> ${b.manager}
                  &nbsp;·&nbsp;
                  <i class="lucide-map-pin" style="font-size:11px;"></i> ${b.region}
                </span>
              </div>
              <span class="badge ${badgeClass}">${b.status}</span>
            </div>

            <hr style="border:none; border-top:1px solid var(--color-border);">

            <div class="flex flex-column gap-sm" style="font-size:13px;">
              <div class="flex justify-between">
                <span class="text-secondary">Staff Members</span>
                <span class="bold">${b.staff} Employee${b.staff !== 1 ? 's' : ''}</span>
              </div>
              <div class="flex justify-between">
                <span class="text-secondary">Disbursed (MTD)</span>
                <span class="bold">₹${disbursed.toFixed(2)} Cr</span>
              </div>
              <div class="flex justify-between">
                <span class="text-secondary">Branch Target</span>
                <span class="bold">₹${target.toFixed(2)} Cr</span>
              </div>
            </div>

            <div>
              <div class="flex justify-between" style="font-size:11px; color:var(--color-text-muted); margin-bottom:5px;">
                <span>Progress</span><span>${pct}%</span>
              </div>
              <div class="progress-bar-container">
                <div class="progress-bar-fill" style="width:${pct}%; background-color:${barColor};"></div>
              </div>
            </div>
          </div>`;
      });

      if (window.lucide) lucide.createIcons();
    }

    // ── Register Branch form submit ─────────────────────────────
    document.getElementById('registerBranchForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const name      = document.getElementById('branchName').value.trim();
      const region    = document.getElementById('branchRegion').value.trim();
      const manager   = document.getElementById('branchManager').value.trim();
      const address   = document.getElementById('branchAddress').value.trim();
      const targetCr  = parseFloat(document.getElementById('branchTargetCr').value);
      const status    = document.getElementById('branchStatus').value;

      api.addBranch({ name, region, manager, address, targetCr, status });
      showToast(`Branch "${name}" registered successfully!`, 'success');
      closeModal('registerBranchModal');
      document.getElementById('registerBranchForm').reset();
      renderBranches();
    });

    // ── Init ────────────────────────────────────────────────────
    renderBranches();
  }
  </script>
</body>
</html>
