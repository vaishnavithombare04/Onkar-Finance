<!DOCTYPE html>
<html lang="en">
<head>
    <script>
      (function() {
        const saved = localStorage.getItem('theme');
        const theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - Onkar Finance</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Shared Global CSS -->
    <link rel="stylesheet" href="../shared/global.css">
</head>
<body>
    <!-- App Header -->
    <header class="app-header">
        <div class="header-brand">
            <button class="btn btn-ghost btn-icon-only d-md-none" id="sidebarToggle">
                <i class="bi bi-list fs-4"></i>
            </button>
            <span class="brand-title"><i class="bi bi-currency-rupee text-primary"></i> Onkar Finance</span>
        </div>
        <div class="header-search d-none d-md-block">
            <i class="bi bi-search header-search-icon"></i>
            <input type="text" placeholder="Search my queries, EMI schedules...">
        </div>
        <div class="header-actions">
            <!-- Notification Bell Dropdown -->
            <div class="dropdown">
                <button class="icon-btn" id="notificationBell" data-bs-toggle="dropdown" aria-expanded="false" style="position: relative; border: none; background: none;">
                    <i class="bi bi-bell fs-5"></i>
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="notifBadge" style="font-size: 9px; padding: 3px 6px;">3</span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end text-small shadow py-2" id="notificationList" style="width: 290px; max-height: 350px; overflow-y: auto;">
                    <li class="dropdown-header border-bottom pb-2 font-weight-700">Notifications</li>
                </ul>
            </div>
            
            <div class="dropdown">
                <a href="#" class="d-block link-body-emphasis text-decoration-none dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false" style="border: none;">
                    <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=80&h=80&q=80" alt="Avatar" width="32" height="32" class="rounded-circle border">
                </a>
                <ul class="dropdown-menu dropdown-menu-end text-small shadow">
                    <li><a class="dropdown-item" href="profile.html">Settings</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item" href="#" onclick="showToast('Signed out successfully', 'success')">Sign out</a></li>
                </ul>
            </div>
        </div>
    </header>

    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="app-sidebar">
            <div class="sidebar-header" style="display: flex; align-items: center; gap: 12px; padding: 16px 8px; border-bottom: 1px solid rgba(255,255,255,0.08); transition: var(--transition-smooth); justify-content: center;">
                <div id="sidebarToggleBtn" style="cursor: pointer; color: #94a3b8; width: 24px; text-align: center;"><i class="bi bi-three-dots"></i></div>
                <span class="brand-title sidebar-label-text" style="color: #ffffff; font-weight: 800; font-size: 15px; white-space: nowrap;">Onkar Finance</span>
            </div>
            <nav class="sidebar-menu">
                <span class="sidebar-label">Customer Portal</span>
                <a href="index.html" class="sidebar-item">
                    <i class="bi bi-speedometer2"></i> <span>Dashboard</span>
                </a>
                <a href="apply.html" class="sidebar-item">
                    <i class="bi bi-file-earmark-plus"></i> <span>Apply for Loan</span>
                </a>
                <a href="upload-docs.html" class="sidebar-item">
                    <i class="bi bi-cloud-arrow-up"></i> <span>Upload Documents</span>
                </a>
                <a href="track.html" class="sidebar-item">
                    <i class="bi bi-geo-alt"></i> <span>Track Application</span>
                </a>
                <a href="notifications.html" class="sidebar-item active">
                    <i class="bi bi-bell"></i> <span>Notifications</span>
                </a>
                <a href="calculator.html" class="sidebar-item">
                    <i class="bi bi-calculator"></i> <span>EMI Calculator</span>
                </a>
                <div class="sidebar-divider"></div>
                <span class="sidebar-label">My Account</span>
                <a href="profile.html" class="sidebar-item">
                    <i class="bi bi-person-gear"></i> <span>My Profile</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="btn btn-ghost theme-toggle-btn w-100 text-start text-white opacity-75">
                    <i class="bi bi-moon me-2"></i> <span class="sidebar-label-text">Dark Mode</span>
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h1 class="h3 font-weight-bold mb-0 text-dark">Notifications Hub</h1>
                    <p class="text-muted font-13 mb-0">All updates, approval alerts, EMI due schedules, and KYC document re-uploads.</p>
                </div>
                <button class="btn btn-outline-danger btn-sm font-12 font-weight-600" onclick="clearAllNotifications()">Clear All</button>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-body p-0">
                    <div class="list-group list-group-flush" id="notificationsHubList">
                        <!-- Dynamic list rendered from mock DB notifications -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Shared Global Logic -->
    <script src="../shared/global.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderNotificationsHub();
        });

        function renderNotificationsHub() {
            const list = document.getElementById('notificationsHubList');
            if (!list) return;

            const notifs = window.mockDB.notifications || [];
            if (notifs.length === 0) {
                list.innerHTML = `
                    <div class="p-4 text-center text-muted">
                        <i class="bi bi-bell-slash fs-2 mb-2 d-block"></i>
                        <span class="font-12">No notifications found. You are all caught up!</span>
                    </div>
                `;
                return;
            }

            list.innerHTML = notifs.map(n => {
                let actionBtn = '';
                if (n.message.toLowerCase().includes('re-upload') || n.message.toLowerCase().includes('upload')) {
                    actionBtn = `<button class="btn btn-primary btn-xs py-1 px-3 font-11 font-weight-600 mt-2" onclick="location.href='upload-docs.html'">Upload docs</button>`;
                } else if (n.message.toLowerCase().includes('application')) {
                    actionBtn = `<button class="btn btn-outline-primary btn-xs py-1 px-3 font-11 mt-2" onclick="location.href='track.html'">Track stage</button>`;
                }

                return `
                    <div class="list-group-item p-3 d-flex gap-3 text-start align-items-start border-bottom" style="background-color: var(--bg-card) !important; border-color: var(--border-color) !important; color: var(--text-primary) !important;">
                        <div class="p-2 rounded text-primary" style="background-color: var(--border-color) !important;"><i class="bi bi-bell"></i></div>
                        <div class="flex-grow-1">
                            <span class="d-block font-13 font-weight-500" style="line-height:1.4; color: var(--text-primary) !important;">${n.message}</span>
                            <small class="text-muted font-10 d-block mt-1"><i class="bi bi-clock me-1"></i>${n.time}</small>
                            ${actionBtn}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function clearAllNotifications() {
            window.mockDB.notifications = [];
            window.saveMockDB();
            renderNotificationsHub();
            showToast('All notifications cleared', 'success');
            // Update badge globally
            const badge = document.getElementById('notifBadge');
            if (badge) badge.style.display = 'none';
        }
    </script>
</body>
</html>
